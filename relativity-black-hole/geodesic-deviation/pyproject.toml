[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "geodesic-deviation"
version = "0.1.0"
description = "Geodesic deviation and tidal forces"
requires-python = ">=3.8"
dependencies = ["numpy", "scipy"]

[project.optional-dependencies]
test = ["pytest"]
