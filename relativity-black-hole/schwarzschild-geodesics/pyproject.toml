[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "schwarzschild-geodesics"
version = "0.1.0"
description = "Schwarzschild geodesic panorama analyzer — all orbit types, effective potential, ISCO, photon sphere"
requires-python = ">=3.10"
dependencies = ["numpy>=1.24", "scipy>=1.11", "matplotlib>=3.7"]

[tool.setuptools.packages.find]
where = ["src"]
