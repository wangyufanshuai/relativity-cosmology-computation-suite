[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hawking-radiation"
version = "0.1.0"
description = "Hawking radiation simulator — black hole evaporation, Page curve, and greybody-corrected emission"
requires-python = ">=3.10"
dependencies = ["numpy>=1.24", "scipy>=1.11", "mpmath>=1.3", "matplotlib>=3.7"]

[tool.setuptools.packages.find]
where = ["src"]
