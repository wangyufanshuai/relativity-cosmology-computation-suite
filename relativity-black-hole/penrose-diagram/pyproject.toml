[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "penrose-diagram"
version = "0.1.0"
description = "Penrose diagram auto-plotter for various spacetimes"
requires-python = ">=3.8"
dependencies = ["numpy", "scipy"]

[project.optional-dependencies]
test = ["pytest"]
